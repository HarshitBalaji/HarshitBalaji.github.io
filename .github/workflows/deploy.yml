name: Deploy React Vite App to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build React Vite app
        run: npm run build

      - name: Deploy to GitHub Pages (external repo)
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: HarshitBalaji/HarshitBalaji.github.io
          publish_branch: gh-pages
          publish_dir: ./dist
          user_name: harshitbalaji
          user_email: sai.harshitbalaji@gmail.com
